<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小天才自检校验码计算器</title>
<meta name="robots" content="index,follow">
    <style>
        :root {
            --bg: #ffffff;
            --text: #222222;
            --inputBg: #fff;
            --border: #cccccc;
            --btnBg: #007bff;
            --btnText: #fff;
            --successBg: #d4edda;
            --successText: #155724;
            --errorBg: #f8d7da;
            --errorText: #721c24;
            --footerText: #666;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #181818;
                --text: #eeeeee;
                --inputBg: #2a2a2a;
                --border: #444444;
                --btnBg: #0066cc;
                --successBg: #1c3c26;
                --successText: #90ee90;
                --errorBg: #421f24;
                --errorText: #ff8888;
                --footerText: #aaa;
            }
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 20px auto;
            padding: 10px;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        .input-group {
            margin-bottom: 15px;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
            border: 1px solid var(--border);
            background: var(--inputBg);
            color: var(--text);
            border-radius: 4px;
        }
        button {
            background: var(--btnBg);
            color: var(--btnText);
            cursor: pointer;
            border: none;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
        }
        .success {
            background-color: var(--successBg);
            color: var(--successText);
        }
        .error {
            background-color: var(--errorBg);
            color: var(--errorText);
        }
        .hidden {
            display: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
            color: var(--footerText);
        }
    </style>
</head>
<body>
<h1 style="display:none;">自检校验码计算器</h1>
    <h2>XTC自检校验码计算器</h2>
    
    <div class="input-group">
        <input type="text" id="codeInput" placeholder="请输入8位数字校验码" maxlength="8">
    </div>
    
    <button id="calculateBtn">计算</button>
    
    <div id="resultContainer" class="result hidden">
        <div id="resultTitle"></div>
        <div id="resultValue"></div>
    </div>

    <script>
        function calculateV3Code(input) {
            try {
                const e = 1;
                if (!/^\d+$/.test(input)) return "";

                const o = parseInt(input[7]) ^ e;
                const n = (parseInt(input[o]) - o + 10) % 10;

                let s = "";
                for (let i = 0; i < 7; i++) {
                    if (i === o) {
                        s += n;
                    } else {
                        const f = parseInt(input[i]);
                        s += ((f + 10 - n) % 10);
                    }
                }

                const c = Math.floor(Math.random() * 7);
                const a = parseInt(s[c]);

                let l = "";
                for (let i = 0; i < 7; i++) {
                    const h = i === c ? c : a;
                    const f = parseInt(s[i]);
                    l += ((f + h) % 10);
                }

                return l + (e ^ c).toString();
            } catch {
                return "";
            }
        }

        function calculate(input) {
            // 强制判断必须8位
            if (input.length !== 8) return "";
            let res;
            do {
                res = calculateV3Code(input);
            } while (!res || res === input);
            return res;
        }

        class Calculator {
            constructor() {
                this.codeInput = document.getElementById("codeInput");
                this.calculateBtn = document.getElementById("calculateBtn");
                this.resultContainer = document.getElementById("resultContainer");
                this.resultTitle = document.getElementById("resultTitle");
                this.resultValue = document.getElementById("resultValue");
                this.attachEventListeners();
            }
            
            attachEventListeners() {
                this.calculateBtn.addEventListener("click", () => this.calc());
                this.codeInput.addEventListener("keypress", e => e.key === "Enter" && this.calc());
            }
            
            calc() {
                const input = this.codeInput.value.trim();
                if (!input) {
                    this.showError("请输入8位校验码");
                    return;
                }
                if (!/^\d+$/.test(input)) {
                    this.showError("仅允许输入数字");
                    return;
                }
                if (input.length !== 8) {
                    this.showError("必须输入8位数字");
                    return;
                }
                const out = calculate(input);
                if (!out) this.showError("计算失败，请重新输入");
                else this.showSuccess(out);
            }
            
            showError(msg) {
                this.resultContainer.className = "result error";
                this.resultTitle.textContent = "错误";
                this.resultValue.textContent = msg;
                this.resultContainer.classList.remove("hidden");
            }
            showSuccess(val) {
                this.resultContainer.className = "result success";
                this.resultTitle.textContent = "计算结果";
                this.resultValue.textContent = val;
                this.resultContainer.classList.remove("hidden");
            }
        }

        document.addEventListener("DOMContentLoaded", () => new Calculator());
    </script>
</body>
</html>
